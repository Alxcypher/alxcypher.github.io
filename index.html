description: Compare special conditions in an uploaded Australian construction contract against the unamended standard form (AS4000, AS4000-2025, AS2124-1992, AS4902-2000) and produce a risk-rated delta report showing every modification, deletion, and insertion. Use this skill whenever the user uploads special conditions, a schedule of amendments, or a marked-up standard form contract and asks for a review, comparison, risk analysis, or wants to understand what's been changed from the base form. Also trigger when the user mentions "special conditions", "amendments to AS4000", "departures from standard form", "schedule of amendments", or asks what's been changed in a construction contract.
---

# Special Conditions Delta Report

You are a senior construction lawyer and contract administrator specialising in Australian standard-form construction contracts.

## Task

When the user provides special conditions (or a schedule of amendments) to a standard-form contract, you must:

1. **Identify the base form** — Determine which standard form is being amended (AS4000-1997, AS4000-2025, AS2124-1992, AS4902-2000, or other). If unclear, ask.

2. **Clause-by-clause comparison** — For every modification, deletion, or insertion, produce a row in the delta table.

3. **For each modification, assess:**

### Direction of Risk Shift
- **PRINCIPAL** — The modification shifts risk toward the principal (favourable to contractor)
- **CONTRACTOR** — The modification shifts risk toward the contractor (favourable to principal)
- **NEUTRAL** — Administrative or clarificatory change with no material risk shift
- **UNCLEAR** — The modification is ambiguous and could be read either way

### Magnitude
- 🔴 **HIGH** — Material change to risk allocation, financial exposure, or legal rights. Examples: deletion of Clause 41.2, insertion of strict time bars, removal of delay costs entitlement, uncapped liability, broadly drafted indemnities, deletion of latent conditions clause.
- 🟡 **MEDIUM** — Meaningful change that narrows or qualifies a right but does not eliminate it. Examples: shortened notice periods (but still >14 days), additional preconditions to entitlement, modified dispute resolution, amended security provisions.
- 🟢 **LOW** — Minor or clarificatory change. Examples: updated terminology, administrative process changes, alignment with current legislation, cosmetic renumbering.

### Interaction Effects
Flag where a modification to one clause creates an unintended consequence in another.

## Output Format

Present findings as a markdown table:

| # | Clause | Standard Form Text (Summary) | Amendment | Risk Direction | Magnitude | Notes |
|---|--------|------------------------------|-----------|----------------|-----------|-------|

Follow the table with:
- **Executive Summary** — 3-5 sentence overview of the key risk themes
- **Top 5 Risks** — Ranked list of the most significant departures
- **Recommendations** — Suggested negotiation points or amendments to rebalance risk`

# Variation Assessment

You are an experienced contract administrator and quantity surveyor specialising in variation assessment under Australian construction contracts.

## Task

When the user provides details of a variation (or potential variation), analyse it across three dimensions:

### 1. Entitlement Analysis
- Is this a variation under the contract? Check the definition clause.
- Was it directed by the Superintendent/Principal, or is it a constructive variation?
- Does it fall within the original scope, or is it genuinely additional/changed work?
- Has the contractor complied with notice requirements?

### 2. Valuation Methodology
Assess which valuation method applies:
- **Scheduled rates** — Do existing contract rates apply?
- **Star rates** — Must new rates be derived? What basis?
- **Cost-plus** — Is daywork/cost-plus appropriate? What records are needed?
- **Lump sum quotation** — Has a quotation been requested/provided?

### 3. Procedural Compliance
Check the variation process against the contract:
- Direction to vary (written? authorised?)
- Notice of claim within required timeframe
- Quotation/estimate provided if required
- Superintendent's assessment and response

## Output Format

Provide:
1. **Entitlement Opinion** — Clear yes/no/partial with reasoning
2. **Recommended Valuation Method** — With worked example if data provided
3. **Procedural Checklist** — Status of each contractual step
4. **Risk Flags** — Time bars, disputed items, missing documentation
5. **Recommended Next Steps** — For either principal or contractor (ask which party the user represents)`

# Extension of Time Analysis

You are a programming and delay analysis expert with deep knowledge of Australian construction contract law.

## Task

Analyse the EOT claim provided by the user against the following framework:

### 1. Qualifying Cause of Delay
- Is the delay event a "qualifying cause" under the contract?
- Common qualifying causes: inclement weather, latent conditions, variations, principal-caused delays
- Non-qualifying: contractor resourcing, subcontractor delays (unless flow-down)

### 2. Delay Analysis Method
Recommend and apply the appropriate method:
- **As-planned vs As-built** — Simple comparison
- **Impacted as-planned** — Insert delay into baseline
- **Collapsed as-built** — Remove delay from actual
- **Time Impact Analysis** — Prospective window analysis (preferred for complex claims)

### 3. Concurrency Assessment
- Are there concurrent delays (contractor + qualifying cause)?
- Apply the Malmaison approach: contractor entitled to EOT even if concurrent, provided qualifying cause is operative
- Document the concurrent delay periods clearly

### 4. Notice Compliance
- Was notice given within the contractual timeframe?
- Was the notice in the correct form?
- Are there time-bar provisions? Were they complied with?
- Is the time bar enforceable? (Consider the Peninsula Balmain line of cases)

## Output Format

|---------|-----------|
| Qualifying Cause | Yes/No + reasoning |
| Critical Path Impact | X working days |
| Concurrency | Yes/No + details |
| Notice Compliant | Yes/No + details |
| Recommended EOT | X working days |

Follow with:

- **Supporting Precedents** — Relevant case law
- **Recommendations** — For claim preparation or assessment`

// ============================================================
// APPLICATION LOGIC
// ============================================================

let currentSkill = null;
let currentSkillRaw = null;

// Build the file tree
function buildTree() {
  const tree = document.getElementById('fileTree');
  let html = '';

  // Root folder
  html += `<div class="tree-item depth-0" onclick="toggleFolder(this)">
    <span class="chevron open">▶</span>
    <span class="icon folder-icon">📂</span>
    <span>.claude</span>
  </div>`;
  html += `<div class="folder-children open">`;

  html += `<div class="tree-item depth-1" onclick="toggleFolder(this)">
    <span class="chevron open">▶</span>
    <span class="icon folder-icon">📂</span>
    <span>skills</span>
    <span class="tag tag-folder">skills</span>
  </div>`;
  html += `<div class="folder-children open">`;

  const colorMap = {
    contract: 'cat-contract',
    estimating: 'cat-estimating',
    project: 'cat-project',
    design: 'cat-design',
    safety: 'cat-safety',
    procurement: 'cat-procurement',
  };

  for (const [folderKey, folder] of Object.entries(skills)) {
    const catClass = colorMap[folder.color] || '';

    html += `<div class="tree-item depth-2" onclick="toggleFolder(this)">
      <span class="chevron">▶</span>
      <span class="icon folder-icon">📁</span>
      <span>${folder.label}</span>
    </div>`;
    html += `<div class="folder-children">`;

    for (const [fileKey, file] of Object.entries(folder.children)) {
      html += `<div class="tree-item depth-3 ${catClass}" data-folder="${folderKey}" data-file="${fileKey}" onclick="selectSkill('${folderKey}', '${fileKey}')">
        <span class="chevron" style="visibility:hidden">▶</span>
        <span class="icon file-icon">📄</span>
        <span>${file.label}</span>
        <span class="tag tag-skill">skill</span>
      </div>`;
    }

    html += `</div>`;
  }

  html += `</div></div>`;
  tree.innerHTML = html;
}

function toggleFolder(el) {
  const children = el.nextElementSibling;
  if (children && children.classList.contains('folder-children')) {
    children.classList.toggle('open');
    const chevron = el.querySelector('.chevron');
    chevron.classList.toggle('open');
    // swap folder icon
    const icon = el.querySelector('.folder-icon');
    if (icon) {
      icon.textContent = children.classList.contains('open') ? '📂' : '📁';
    }
  }
}

function selectSkill(folderKey, fileKey) {
  const file = skills[folderKey].children[fileKey];
  if (!file) return;

  currentSkill = file;
  currentSkillRaw = file.content;

  // Update active state
  document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
  const item = document.querySelector(`[data-folder="${folderKey}"][data-file="${fileKey}"]`);
  if (item) item.classList.add('active');

  // Update path
  document.getElementById('contentPath').innerHTML =
    `.claude / skills / <span>${folderKey}</span> / <span>${fileKey}</span>`;

  // Show copy button
  document.getElementById('btnCopy').classList.add('visible');

  // Update tab
  const tab = document.getElementById('tab-skill');
  tab.textContent = fileKey;
  tab.classList.add('active');
  document.querySelector('.header-tab:first-child').classList.remove('active');

  // Render content
  renderSkill(file);
}

function renderSkill(file) {
  const body = document.getElementById('contentBody');

  // Parse out the frontmatter description
  const content = file.content;
  let mainContent = content;
  let description = file.description;

  // Remove frontmatter from rendering
  const fmMatch = content.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (fmMatch) {
    mainContent = fmMatch[2];
  }

  // Render markdown
  const rendered = marked.parse(mainContent);

  body.innerHTML = `
    <div class="md-content">
      <div class="skill-description">${description}</div>
      ${rendered}
    </div>
  `;
}

function showWelcome() {
  currentSkill = null;
  currentSkillRaw = null;

  document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
  document.getElementById('btnCopy').classList.remove('visible');
  document.getElementById('contentPath').innerHTML = '';

  document.querySelector('.header-tab:first-child').classList.add('active');
  document.getElementById('tab-skill').classList.remove('active');
  document.getElementById('tab-skill').textContent = 'SKILL.md';

  const body = document.getElementById('contentBody');
  body.innerHTML = `
    <div class="welcome">
      <div class="welcome-title">CONSTRUCTION<br>SKILLS IDE</div>
      <div class="welcome-sub">
        A collection of AI skills for building and construction professionals.
        Browse the folder tree, click a skill to preview it, then copy it into Claude or Cowork.
      </div>
      <div class="welcome-instructions">
        <span class="step-num">1</span> Browse the <span class="highlight">file tree</span> on the left<br>
        <span class="step-num">2</span> Click any <span class="highlight">skill</span> to preview it<br>
        <span class="step-num">3</span> Hit <span class="highlight">Copy Skill</span> to grab the markdown<br>
        <span class="step-num">4</span> Paste into <span class="highlight">Claude</span> or <span class="highlight">Cowork</span>
      </div>
      <div class="quick-start" id="quickStart"></div>
    </div>
  `;

  // Add quick-start chips
  const qs = document.getElementById('quickStart');
  const categories = Object.keys(skills);
  categories.forEach(cat => {
    const chip = document.createElement('span');
    chip.className = 'quick-chip';
    chip.textContent = cat;
    chip.onclick = () => {
      // Expand folder and select first skill
      const firstFile = Object.keys(skills[cat].children)[0];
      // Open the folder in the tree
      document.querySelectorAll('.tree-item.depth-2').forEach(el => {
        if (el.textContent.includes(cat)) {
          const children = el.nextElementSibling;
          if (children && !children.classList.contains('open')) {
            toggleFolder(el);
          }
        }
      });
      selectSkill(cat, firstFile);
    };
    qs.appendChild(chip);
  });
}

function copySkill() {
  if (!currentSkillRaw) return;

  navigator.clipboard.writeText(currentSkillRaw).then(() => {
    const btn = document.getElementById('btnCopy');
    const icon = document.getElementById('copyIcon');
    btn.classList.add('copied');
    icon.textContent = '✅';
    btn.innerHTML = '<span>✅</span> Copied!';

    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<span>📋</span> Copy Skill';
    }, 2000);
  });
}

function filterTree(query) {
  const q = query.toLowerCase().trim();
  const items = document.querySelectorAll('.tree-item.depth-3');

  items.forEach(item => {
    const text = item.textContent.toLowerCase();
    const folderKey = item.dataset.folder;
    const fileKey = item.dataset.file;
    const desc = skills[folderKey]?.children[fileKey]?.description?.toLowerCase() || '';

    if (!q || text.includes(q) || desc.includes(q) || folderKey.includes(q)) {
      item.classList.remove('hidden');
    } else {
      item.classList.add('hidden');
    }
  });

  // Auto-expand folders that have visible children
  if (q) {
    document.querySelectorAll('.folder-children').forEach(fc => {
      const hasVisible = fc.querySelector('.tree-item.depth-3:not(.hidden)');
      if (hasVisible && !fc.classList.contains('open')) {
        fc.classList.add('open');
        const chevron = fc.previousElementSibling?.querySelector('.chevron');
        if (chevron) chevron.classList.add('open');
        const icon = fc.previousElementSibling?.querySelector('.folder-icon');
        if (icon) icon.textContent = '📂';
      }
    });
  }
}

// Initialize
buildTree();
showWelcome();

// Resizable sidebar
const resizeHandle = document.getElementById('resizeHandle');
const sidebar = document.querySelector('.sidebar');
let isResizing = false;

resizeHandle.addEventListener('mousedown', (e) => {
  isResizing = true;
  resizeHandle.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const newWidth = e.clientX;
  const min = parseInt(getComputedStyle(sidebar).minWidth);
  const max = parseInt(getComputedStyle(sidebar).maxWidth);
  sidebar.style.width = Math.max(min, Math.min(max, newWidth)) + 'px';
});

document.addEventListener('mouseup', () => {
  if (isResizing) {
    isResizing = false;
    resizeHandle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// Count skills
let totalSkills = 0;
Object.values(skills).forEach(folder => {
  totalSkills += Object.keys(folder.children).length;
});
document.getElementById('skillCount').textContent = totalSkills + ' skills';
</script>
